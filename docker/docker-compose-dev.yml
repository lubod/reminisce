# Fully dockerized development & test setup
# Run from repo root: docker compose --project-directory . -f docker/docker-compose-dev.yml up -d
# Or simply: ./dev start
#
# Access points:
#   Web UI:   https://localhost:28444  (or http://localhost:28081)
#   API:      http://localhost:8080
#   NetBird:  https://100.67.114.198:28444 (from Android/other devices)

services:
  # === NETBIRD MESH VPN ===
  netbird:
    image: netbirdio/netbird:latest
    container_name: netbird-client
    network_mode: host
    cap_add: [NET_ADMIN, SYS_ADMIN, SYS_RESOURCE]
    devices: ["/dev/net/tun:/dev/net/tun"]
    volumes:
      - netbird_config:/etc/netbird
    environment:
      NB_SETUP_KEY: "${NETBIRD_SETUP_KEY}"
      NB_MANAGEMENT_URL: "${NETBIRD_MANAGEMENT_URL:-https://your-netbird-server.example.com}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "netbird", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # === DATABASES ===
  postgres:
    image: lubod/reminisce-postgres:latest
    container_name: reminisce-dev-db
    environment:
      POSTGRES_DB: reminisce_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  geotagging-db:
    image: lubod/geodb:latest
    container_name: reminisce-dev-geotagging
    environment:
      POSTGRES_DB: geotagging_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5435:5432"
    volumes:
      - geotagging_dev_data:/var/lib/postgresql/data
      - ./geodb_builder/geodb-entrypoint.sh:/usr/local/bin/custom-entrypoint.sh:ro
    restart: unless-stopped
    entrypoint: ["/bin/bash", "/usr/local/bin/custom-entrypoint.sh"]
    command: >
      postgres -c listen_addresses='*'
               -c 'max_connections=100'
               -c 'shared_buffers=128MB'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === AI SERVICE ===
  ai-server:
    build:
      context: ./ai
      dockerfile: Dockerfile
    image: lubod/reminisce-ai-server:local
    container_name: reminisce-dev-ai
    ports:
      - "8081:8081"
    volumes:
      - ai_dev_model_cache:/root/.cache/huggingface
      - face_dev_model_cache:/root/.insightface
      - ./ai/ai_service.py:/app/ai_service.py
    environment:
      - HSA_OVERRIDE_GFX_VERSION=11.5.0
      - TORCH_ROCM_AOTRITON_ENABLE_EXPERIMENTAL=1
      - ROCBLAS_USE_HIPBLASLT=1
    devices:
      - /dev/dri:/dev/dri
      - /dev/kfd:/dev/kfd
    restart: unless-stopped

  # === REMINISCE SERVER ===
  # Runs on host network so it can reach:
  #   - Databases on localhost:5432/5435 (port-mapped)
  #   - AI on localhost:8081 (port-mapped)
  #   - P2P nodes on NetBird overlay IP (port-mapped)
  #   - OTLP on localhost:4317 (port-mapped)
  reminisce:
    image: lubod/reminisce:latest
    container_name: reminisce-dev-server
    network_mode: host
    depends_on:
      postgres: { condition: service_healthy }
      geotagging-db: { condition: service_healthy }
      netbird: { condition: service_healthy }
    volumes:
      - ./config-fullstack.yaml:/app/config.yaml:ro
      - ./uploaded_images:/app/uploaded_images
      - ./uploaded_videos:/app/uploaded_videos
      - reminisce_dev_p2p_data:/app/data/p2p
    environment:
      - RUST_LOG=info
    command: ["config.yaml"]
    restart: unless-stopped

  # === P2P STORAGE NODES ===
  storage-node-1:
    image: lubod/reminisce-p2p:latest
    container_name: p2p-dev-node-1
    command: np2pd --listen 0.0.0.0:5050 --data-dir /data
    ports:
      - "5050:5050/udp"
    volumes:
      - p2p_dev_data_1:/data
    restart: unless-stopped

  storage-node-2:
    image: lubod/reminisce-p2p:latest
    container_name: p2p-dev-node-2
    command: np2pd --listen 0.0.0.0:5051 --data-dir /data
    ports:
      - "5051:5051/udp"
    volumes:
      - p2p_dev_data_2:/data
    restart: unless-stopped

  storage-node-3:
    image: lubod/reminisce-p2p:latest
    container_name: p2p-dev-node-3
    command: np2pd --listen 0.0.0.0:5052 --data-dir /data
    ports:
      - "5052:5052/udp"
    volumes:
      - p2p_dev_data_3:/data
    restart: unless-stopped

  storage-node-4:
    image: lubod/reminisce-p2p:latest
    container_name: p2p-dev-node-4
    command: np2pd --listen 0.0.0.0:5053 --data-dir /data
    ports:
      - "5053:5053/udp"
    volumes:
      - p2p_dev_data_4:/data
    restart: unless-stopped

  storage-node-5:
    image: lubod/reminisce-p2p:latest
    container_name: p2p-dev-node-5
    command: np2pd --listen 0.0.0.0:5054 --data-dir /data
    ports:
      - "5054:5054/udp"
    volumes:
      - p2p_dev_data_5:/data
    restart: unless-stopped

  # === NGINX + BUILT CLIENT ===
  # Uses the pre-built client image (React app + nginx)
  # Overrides nginx config to proxy API to host network backend
  nginx:
    build:
      context: ./client
      dockerfile: Dockerfile
    image: lubod/reminisce-client:latest
    container_name: reminisce-dev-nginx
    ports:
      - "28081:80"
      - "28444:443"
    volumes:
      - ./nginx/nginx-fullstack.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/generate-ssl-certs-fullstack.sh:/docker-entrypoint.d/00-generate-certs.sh:ro
      - nginx_dev_ssl:/etc/nginx/ssl
    environment:
      - EXTRA_SAN_IPS=IP:${NETBIRD_OVERLAY_IP:-100.64.0.1}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - reminisce
    restart: unless-stopped
    command: >
      sh -c "/docker-entrypoint.d/00-generate-certs.sh &&
             exec nginx -g 'daemon off;'"

volumes:
  netbird_config:
  postgres_dev_data:
  geotagging_dev_data:
  ai_dev_model_cache:
  face_dev_model_cache:
  nginx_dev_ssl:
  reminisce_dev_p2p_data:
  p2p_dev_data_1:
  p2p_dev_data_2:
  p2p_dev_data_3:
  p2p_dev_data_4:
  p2p_dev_data_5:
