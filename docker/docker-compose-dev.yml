# Fully dockerized development & test setup
# Run from repo root: docker compose --project-directory . -f docker/docker-compose-dev.yml up -d
# Or simply: ./dev start
#
# Access points:
#   Web UI:   https://localhost:28444  (or http://localhost:28081)
#   API:      http://localhost:8080
#
# Discovery:
#   - LAN: storage nodes broadcast UDP on port 5060; main server listens
#   - Cross-network: coordinator on port 5055

services:
  # === DATABASES ===
  postgres:
    image: lubod/reminisce-postgres:latest
    container_name: reminisce-dev-db
    environment:
      POSTGRES_DB: reminisce_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  geotagging-db:
    image: lubod/geodb:latest
    container_name: reminisce-dev-geotagging
    environment:
      POSTGRES_DB: geotagging_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5435:5432"
    volumes:
      - geotagging_dev_data:/var/lib/postgresql/data
      - ./geodb_builder/geodb-entrypoint.sh:/usr/local/bin/custom-entrypoint.sh:ro
    restart: unless-stopped
    entrypoint: ["/bin/bash", "/usr/local/bin/custom-entrypoint.sh"]
    command: >
      postgres -c listen_addresses='*'
               -c 'max_connections=100'
               -c 'shared_buffers=128MB'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === AI SERVICE ===
  ai-server:
    build:
      context: ./ai
      dockerfile: Dockerfile
    image: lubod/reminisce-ai-server:local
    container_name: reminisce-dev-ai-server
    ports:
      - "8081:8081"
    volumes:
      - ai_dev_model_cache:/root/.cache/huggingface
      - face_dev_model_cache:/root/.insightface
      - ./ai/ai_service.py:/app/ai_service.py
    environment:
      - HSA_OVERRIDE_GFX_VERSION=11.5.0
      - TORCH_ROCM_AOTRITON_ENABLE_EXPERIMENTAL=1
      - ROCBLAS_USE_HIPBLASLT=1
    devices:
      - /dev/dri:/dev/dri
      - /dev/kfd:/dev/kfd
    restart: unless-stopped

  # === P2P COORDINATOR ===
  # Lightweight registry for cross-network discovery.
  # In production, run this on a VPS instead.
  coordinator:
    image: lubod/reminisce-coordinator:latest
    container_name: reminisce-dev-coordinator
    network_mode: host
    # On VPS: add --tls-cert /etc/letsencrypt/live/dnet.openreminisce.org/fullchain.pem
    #              --tls-key /etc/letsencrypt/live/dnet.openreminisce.org/privkey.pem
    command: coordinator --listen 0.0.0.0:5055 --tunnel-port 8443
    restart: unless-stopped

  # === REMINISCE SERVER ===
  reminisce:
    image: lubod/reminisce:latest
    container_name: reminisce-dev-server
    network_mode: host
    depends_on:
      postgres: { condition: service_healthy }
      geotagging-db: { condition: service_healthy }
    volumes:
      - ./config-fullstack.yaml:/app/config.yaml:ro
      - ./uploaded_images:/app/uploaded_images
      - ./uploaded_videos:/app/uploaded_videos
      - reminisce_dev_p2p_data:/app/data/p2p
    environment:
      - RUST_LOG=info
    command: ["config.yaml"]
    restart: unless-stopped

  # === P2P STORAGE NODES ===
  # network_mode: host so UDP broadcasts reach the LAN (and other PCs on the same network).
  # Each node announces itself; the main server listens on port 5060 for announcements.
  storage-node-1:
    image: lubod/reminisce-p2p:latest
    container_name: p2p-dev-node-1
    network_mode: host
    command: >
      np2pd --listen 0.0.0.0:5050
            --data-dir /data
            --discovery-port 5060
            --coordinator-addr 127.0.0.1:5055
    volumes:
      - p2p_dev_data_1:/data
    restart: unless-stopped

  storage-node-2:
    image: lubod/reminisce-p2p:latest
    container_name: p2p-dev-node-2
    network_mode: host
    command: >
      np2pd --listen 0.0.0.0:5051
            --data-dir /data
            --discovery-port 5060
            --coordinator-addr 127.0.0.1:5055
    volumes:
      - p2p_dev_data_2:/data
    restart: unless-stopped

  storage-node-3:
    image: lubod/reminisce-p2p:latest
    container_name: p2p-dev-node-3
    network_mode: host
    command: >
      np2pd --listen 0.0.0.0:5052
            --data-dir /data
            --discovery-port 5060
            --coordinator-addr 127.0.0.1:5055
    volumes:
      - p2p_dev_data_3:/data
    restart: unless-stopped

  storage-node-4:
    image: lubod/reminisce-p2p:latest
    container_name: p2p-dev-node-4
    network_mode: host
    command: >
      np2pd --listen 0.0.0.0:5053
            --data-dir /data
            --discovery-port 5060
            --coordinator-addr 127.0.0.1:5055
    volumes:
      - p2p_dev_data_4:/data
    restart: unless-stopped

  storage-node-5:
    image: lubod/reminisce-p2p:latest
    container_name: p2p-dev-node-5
    network_mode: host
    command: >
      np2pd --listen 0.0.0.0:5054
            --data-dir /data
            --discovery-port 5060
            --coordinator-addr 127.0.0.1:5055
    volumes:
      - p2p_dev_data_5:/data
    restart: unless-stopped

  # === CLIENT (React app served via nginx) ===
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    image: lubod/reminisce-client:latest
    container_name: reminisce-dev-client
    ports:
      - "28081:80"
      - "28444:443"
    volumes:
      - ./nginx/nginx-fullstack.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/generate-ssl-certs-fullstack.sh:/docker-entrypoint.d/00-generate-certs.sh:ro
      - client_dev_ssl:/etc/nginx/ssl
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - reminisce
    restart: unless-stopped
    command: >
      sh -c "/docker-entrypoint.d/00-generate-certs.sh &&
             exec nginx -g 'daemon off;'"

volumes:
  postgres_dev_data:
  geotagging_dev_data:
  ai_dev_model_cache:
  face_dev_model_cache:
  client_dev_ssl:
  reminisce_dev_p2p_data:
  p2p_dev_data_1:
  p2p_dev_data_2:
  p2p_dev_data_3:
  p2p_dev_data_4:
  p2p_dev_data_5:
