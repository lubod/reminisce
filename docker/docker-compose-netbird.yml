# NetBird Mesh VPN deployment for Reminisce
# Run from repo root: docker compose --project-directory . -f docker/docker-compose-netbird.yml up -d
#
# Required .env variables:
#   NETBIRD_SETUP_KEY  - Setup key from: ./netbird/manage.sh create-key <name>

services:
  # --- NetBird client (one per host) ---
  netbird:
    image: netbirdio/netbird:latest
    container_name: netbird-client
    network_mode: host
    cap_add: [NET_ADMIN, SYS_ADMIN, SYS_RESOURCE]
    devices: ["/dev/net/tun:/dev/net/tun"]
    volumes:
      - netbird_config:/etc/netbird
    environment:
      NB_SETUP_KEY: "${NETBIRD_SETUP_KEY}"
      NB_MANAGEMENT_URL: "${NETBIRD_MANAGEMENT_URL:-https://your-netbird-server.example.com}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "netbird", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # --- Main Reminisce server ---
  reminisce-server:
    image: lubod/reminisce:latest
    container_name: reminisce-server
    network_mode: host
    depends_on:
      netbird: { condition: service_healthy }
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./uploaded_images:/app/uploaded_images
      - ./uploaded_videos:/app/uploaded_videos
      - ./data:/app/data
    restart: unless-stopped

  # --- Storage nodes (different ports on same host) ---
  storage-node-1:
    image: lubod/reminisce-p2p:latest
    container_name: p2p-storage-1
    network_mode: host
    command: np2pd --listen 0.0.0.0:5050 --data-dir /data
    depends_on:
      netbird: { condition: service_healthy }
    volumes:
      - p2p_data_1:/data
    restart: unless-stopped

  storage-node-2:
    image: lubod/reminisce-p2p:latest
    container_name: p2p-storage-2
    network_mode: host
    command: np2pd --listen 0.0.0.0:5051 --data-dir /data
    depends_on:
      netbird: { condition: service_healthy }
    volumes:
      - p2p_data_2:/data
    restart: unless-stopped

  storage-node-3:
    image: lubod/reminisce-p2p:latest
    container_name: p2p-storage-3
    network_mode: host
    command: np2pd --listen 0.0.0.0:5052 --data-dir /data
    depends_on:
      netbird: { condition: service_healthy }
    volumes:
      - p2p_data_3:/data
    restart: unless-stopped

  storage-node-4:
    image: lubod/reminisce-p2p:latest
    container_name: p2p-storage-4
    network_mode: host
    command: np2pd --listen 0.0.0.0:5053 --data-dir /data
    depends_on:
      netbird: { condition: service_healthy }
    volumes:
      - p2p_data_4:/data
    restart: unless-stopped

  storage-node-5:
    image: lubod/reminisce-p2p:latest
    container_name: p2p-storage-5
    network_mode: host
    command: np2pd --listen 0.0.0.0:5054 --data-dir /data
    depends_on:
      netbird: { condition: service_healthy }
    volumes:
      - p2p_data_5:/data
    restart: unless-stopped

volumes:
  netbird_config:
  p2p_data_1:
  p2p_data_2:
  p2p_data_3:
  p2p_data_4:
  p2p_data_5:
