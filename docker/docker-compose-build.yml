# Build all Docker images
# Run from repo root: docker compose --project-directory . -f docker/docker-compose-build.yml build
# Or push:           docker compose --project-directory . -f docker/docker-compose-build.yml push

services:
  postgres:
    build:
      context: .
      dockerfile: docker/Dockerfile.postgres
    image: lubod/reminisce-postgres:latest
    container_name: reminisce-postgres-build

  reminisce:
    build:
      context: .
      dockerfile: Dockerfile
    image: lubod/reminisce:latest
    container_name: reminisce-build

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    image: lubod/reminisce-client:latest
    container_name: reminisce-client-build

  ai-server:
    build:
      context: ./ai
      dockerfile: Dockerfile
    image: lubod/reminisce-ai-server:latest
    container_name: reminisce-ai-server-build

  p2p-node:
    build:
      context: .
      dockerfile: docker/Dockerfile.p2p
      target: storage
    image: lubod/reminisce-p2p:latest
    container_name: reminisce-p2p-build

  coordinator:
    build:
      context: .
      dockerfile: docker/Dockerfile.p2p
      target: coordinator
    image: lubod/reminisce-coordinator:latest
    container_name: reminisce-coordinator-build
