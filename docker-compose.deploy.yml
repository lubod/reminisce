version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-reminisce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_password}
      POSTGRES_DB: ${POSTGRES_DB:-reminisce_relay}
    volumes:
      - relay_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-reminisce} -d ${POSTGRES_DB:-reminisce_relay}"]
      interval: 5s
      timeout: 5s
      retries: 5

  relay:
    image: lubod/reminisce-relay:latest
    build:
      context: .
      dockerfile: relay/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-reminisce}:${POSTGRES_PASSWORD:-secure_password}@postgres:5432/${POSTGRES_DB:-reminisce_relay}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set — generate with: openssl rand -base64 32}
      - PORT=8080
      - RUST_LOG=info
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

volumes:
  relay_db_data:
