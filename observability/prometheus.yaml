global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'gpu-exporter'
    static_configs:
      - targets: ['gpu-exporter:9400']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
    metric_relabel_configs:
      # Keep pg_settings_max_connections (used by DB pool alerts), drop the rest (~200 static config values)
      - source_labels: [__name__]
        regex: 'pg_settings_.+'
        target_label: __tmp_drop
        replacement: '1'
      - source_labels: [__name__]
        regex: 'pg_settings_max_connections'
        target_label: __tmp_drop
        replacement: '0'
      - source_labels: [__tmp_drop]
        regex: '1'
        action: drop

  - job_name: 'reminisce'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['reminisce:8080']
